name: Refresh demo dashboard

# Rebuilds the OFFLINE static snapshot of the full web UI and republishes it to /docs, which
# GitHub Pages serves at https://yalegend.github.io/signal/ . Offline + heuristic scorer =>
# ZERO secrets. Runs weekly and on demand; commits only when the built page actually changes.
# The auto-commit carries [skip ci] so it doesn't re-trigger the evals workflow.

on:
  workflow_dispatch:          # Actions ▸ "Refresh demo dashboard" ▸ Run workflow
  schedule:
    - cron: "0 6 * * 1"       # Mondays 06:00 UTC

permissions:
  contents: write             # needed to push the refreshed docs/index.html

concurrency:
  group: refresh-demo
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install offline deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Build static demo (full SPA snapshot)
        env:
          SIGNAL_LLM_PROVIDER: heuristic
        run: PYTHONPATH=src python scripts/build_static_demo.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/; then
            echo "No change under docs/ — nothing to refresh."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Refresh static demo [skip ci]"
          git push
