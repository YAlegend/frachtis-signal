# Render Blueprint — free public demo of the Signal web UI.
# Runs in demo / heuristic mode with NO secrets: bundled fixtures + the deterministic
# heuristic scorer. The hosted copy binds 0.0.0.0:$PORT EXPLICITLY (Render injects $PORT and
# detects the open port to mark the service live); local runs stay localhost-only.
services:
  - type: web
    name: signal-demo
    runtime: python
    plan: free
    buildCommand: pip install pyyaml
    startCommand: PYTHONPATH=src python -u -m signalfund.webapp --host 0.0.0.0 --port $PORT --no-open
    envVars:
      - key: SIGNAL_LLM_PROVIDER
        value: heuristic
