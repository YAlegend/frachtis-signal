<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <title>Signal — Business Process Diagram</title>
  <desc>A swimlane process diagram with three lanes — Partner (human), Signal pipeline (automated), and Governance. The partner triggers a run; the pipeline gathers free and premium sources, dedups, enriches with six signals, scores against the thesis, screens anti-signals, ranks into a digest, and generates source-cited memos; the partner reviews and marks feedback that calibrates the scorer; Governance runs CI evals and a point-in-time backtest that gate reliability.</desc>

  <style>
    .h1{font-size:23px;font-weight:700;fill:#0f172a}
    .sub{font-size:13px;fill:#64748b}
    .lane{font-size:12px;font-weight:700;fill:#ffffff;letter-spacing:.04em}
    .t{font-size:13px;font-weight:600;fill:#0f172a}
    .s{font-size:10.5px;fill:#64748b}
    .lg{font-size:11px;fill:#334155}
    .badge{font-size:10px;font-weight:700;fill:#ffffff}
    .src{font-size:10.5px;fill:#1f2937}
    .srch{font-size:10.5px;font-weight:700;fill:#334155}
    .flow{fill:none;stroke:#475569;stroke-width:2}
    .fb{fill:none;stroke:#4f46e5;stroke-width:1.8;stroke-dasharray:5 4}
  </style>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="arrowi" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4f46e5"/></marker>
  </defs>

  <rect x="0" y="0" width="1280" height="800" fill="#ffffff"/>

  <!-- header -->
  <text x="40" y="40" class="h1">Signal — Business Process Diagram</text>
  <text x="40" y="60" class="sub">Thesis-driven dealflow: source → score → diligence, with a human in the loop and a reliability gate.</text>

  <!-- legend -->
  <g transform="translate(792,30)">
    <circle cx="6" cy="6" r="5" fill="#16a34a"/><text x="16" y="10" class="lg">free source</text>
    <circle cx="106" cy="6" r="5" fill="#d97706"/><text x="116" y="10" class="lg">premium source</text>
    <rect x="222" y="1" width="14" height="10" rx="2" fill="#ffffff" stroke="#94a3b8"/><text x="242" y="10" class="lg">process</text>
    <path d="M312,6 l9,-8 l9,8 l-9,8 Z" fill="#fffbeb" stroke="#d97706"/><text x="336" y="10" class="lg">decision</text>
    <path d="M404,-2 a8,8 0 0 0 0,16 h40 a8,8 0 0 0 0,-16 Z" fill="#eef2ff" stroke="#6366f1"/><text x="416" y="10" class="lg">data</text>
  </g>

  <!-- lane bands -->
  <rect x="150" y="92"  width="1106" height="150" fill="#f5f7fb"/>
  <rect x="150" y="242" width="1106" height="318" fill="#f7faf9"/>
  <rect x="150" y="560" width="1106" height="156" fill="#faf7f2"/>
  <rect x="150" y="92" width="1106" height="624" fill="none" stroke="#e2e8f0"/>
  <line x1="150" y1="242" x2="1256" y2="242" stroke="#e2e8f0"/>
  <line x1="150" y1="560" x2="1256" y2="560" stroke="#e2e8f0"/>

  <!-- lane headers -->
  <rect x="40" y="92"  width="110" height="150" fill="#4f46e5"/>
  <rect x="40" y="242" width="110" height="318" fill="#0f766e"/>
  <rect x="40" y="560" width="110" height="156" fill="#475569"/>
  <text class="lane" text-anchor="middle" dominant-baseline="central" x="95" y="167" transform="rotate(-90 95 167)">PARTNER · HUMAN</text>
  <text class="lane" text-anchor="middle" dominant-baseline="central" x="95" y="401" transform="rotate(-90 95 401)">SIGNAL · AUTOMATED</text>
  <text class="lane" text-anchor="middle" dominant-baseline="central" x="95" y="638" transform="rotate(-90 95 638)">GOVERNANCE</text>

  <!-- ===== PARTNER lane ===== -->
  <!-- start -->
  <circle cx="208" cy="158" r="26" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
  <text x="208" y="155" text-anchor="middle" class="t">Trigger</text>
  <text x="208" y="169" text-anchor="middle" class="s">run</text>
  <text x="208" y="200" text-anchor="middle" class="s">button · CLI · schedule</text>

  <!-- review -->
  <rect x="912" y="130" width="150" height="56" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="987" y="153" text-anchor="middle" class="t">Review digest</text>
  <text x="987" y="169" text-anchor="middle" class="s">mark up / down</text>

  <!-- read memo -->
  <rect x="1088" y="130" width="96" height="56" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1136" y="153" text-anchor="middle" class="t">Read memo</text>
  <text x="1136" y="169" text-anchor="middle" class="s">diligence</text>

  <!-- end -->
  <circle cx="1226" cy="158" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1226" y="155" text-anchor="middle" class="s" font-weight="700" fill="#166534">act on</text>
  <text x="1226" y="167" text-anchor="middle" class="s" font-weight="700" fill="#166534">deal</text>

  <!-- ===== SIGNAL pipeline lane ===== -->
  <!-- gather -->
  <rect x="170" y="332" width="116" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="228" y="356" text-anchor="middle" class="t">Gather</text>
  <text x="228" y="372" text-anchor="middle" class="s">free + premium</text>
  <!-- dedup -->
  <rect x="312" y="332" width="96" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="360" y="356" text-anchor="middle" class="t">Dedup</text>
  <text x="360" y="372" text-anchor="middle" class="s">exact + fuzzy</text>
  <!-- enrich -->
  <rect x="434" y="332" width="120" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="494" y="356" text-anchor="middle" class="t">Enrich</text>
  <text x="494" y="372" text-anchor="middle" class="s">6 signals</text>
  <!-- score -->
  <rect x="580" y="332" width="150" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="655" y="354" text-anchor="middle" class="t">Score</text>
  <text x="655" y="370" text-anchor="middle" class="s">fit 60% · signals 40%</text>
  <text x="655" y="383" text-anchor="middle" class="s">+ stage-gate</text>
  <!-- decision -->
  <path d="M812,332 l46,29 l-46,29 l-46,-29 Z" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <text x="812" y="358" text-anchor="middle" class="s" font-weight="700" fill="#92400e">anti-</text>
  <text x="812" y="370" text-anchor="middle" class="s" font-weight="700" fill="#92400e">signal?</text>
  <!-- digest (data store) -->
  <path d="M904,334 a10,8 0 0 0 0,52 h120 a10,8 0 0 0 0,-52 Z" fill="#eef2ff" stroke="#6366f1"/>
  <text x="966" y="357" text-anchor="middle" class="t">Rank → Digest</text>
  <text x="966" y="373" text-anchor="middle" class="s">digest.md · dashboard</text>
  <!-- memo -->
  <rect x="1078" y="332" width="118" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1137" y="356" text-anchor="middle" class="t">Generate memo</text>
  <text x="1137" y="372" text-anchor="middle" class="s">source-cited</text>

  <!-- screen-out end -->
  <rect x="760" y="470" width="104" height="40" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="812" y="488" text-anchor="middle" class="s" font-weight="700" fill="#991b1b">Screen out</text>
  <text x="812" y="501" text-anchor="middle" class="s" fill="#991b1b">ponzi / presale</text>

  <!-- sources panel -->
  <rect x="168" y="412" width="330" height="128" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="182" y="431" class="srch">SOURCES</text>
  <text x="300" y="431" class="s">graceful — missing key contributes 0</text>
  <!-- free -->
  <g transform="translate(182,446)">
    <circle cx="4" cy="6" r="4" fill="#16a34a"/><text x="14" y="10" class="src">GitHub velocity (own MCP)</text>
    <circle cx="4" cy="24" r="4" fill="#16a34a"/><text x="14" y="28" class="src">DefiLlama + Blockscout</text>
    <circle cx="4" cy="42" r="4" fill="#16a34a"/><text x="14" y="46" class="src">OpenRank · arXiv / IACR</text>
    <circle cx="4" cy="60" r="4" fill="#16a34a"/><text x="14" y="64" class="src">network_radar · watchlist</text>
  </g>
  <!-- premium -->
  <g transform="translate(330,446)">
    <circle cx="4" cy="6" r="4" fill="#d97706"/><text x="14" y="10" class="src">Harmonic (team)</text>
    <circle cx="4" cy="24" r="4" fill="#d97706"/><text x="14" y="28" class="src">Messari (stage-gate)</text>
    <circle cx="4" cy="42" r="4" fill="#d97706"/><text x="14" y="46" class="src">Nansen (smart-money)</text>
    <circle cx="4" cy="60" r="4" fill="#d97706"/><text x="14" y="64" class="src">Neynar · Evertrace</text>
  </g>

  <!-- ===== GOVERNANCE lane ===== -->
  <rect x="392" y="598" width="196" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="490" y="622" text-anchor="middle" class="t">Evals — CI-gated</text>
  <text x="490" y="638" text-anchor="middle" class="s">precision / recall floors</text>

  <rect x="636" y="598" width="248" height="58" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="760" y="620" text-anchor="middle" class="t">Phase 0 backtest</text>
  <text x="760" y="636" text-anchor="middle" class="s">point-in-time reliability gate</text>
  <circle cx="666" cy="617" r="6" fill="#eab308"/>
  <text x="760" y="649" text-anchor="middle" class="s" fill="#92400e" font-weight="700">YELLOW · public 67% / warm-intro 0%</text>

  <!-- ===== flows ===== -->
  <!-- pipeline left to right -->
  <path class="flow" d="M286,361 H312" marker-end="url(#arrow)"/>
  <path class="flow" d="M408,361 H434" marker-end="url(#arrow)"/>
  <path class="flow" d="M554,361 H580" marker-end="url(#arrow)"/>
  <path class="flow" d="M730,361 H766" marker-end="url(#arrow)"/>
  <path class="flow" d="M858,361 H904" marker-end="url(#arrow)"/>
  <text x="881" y="353" text-anchor="middle" class="s" fill="#16a34a">pass</text>
  <path class="flow" d="M1026,361 H1078" marker-end="url(#arrow)"/>
  <!-- decision down to screen-out -->
  <path class="flow" d="M812,390 V470" marker-end="url(#arrow)"/>
  <text x="824" y="430" class="s" fill="#991b1b">yes</text>
  <!-- sources up into gather -->
  <path class="flow" d="M228,412 V390" marker-end="url(#arrow)"/>

  <!-- start (partner) down into gather -->
  <path class="flow" d="M208,184 V332" marker-end="url(#arrow)"/>
  <!-- digest up to review -->
  <path class="flow" d="M966,334 V210 H987 V186" marker-end="url(#arrow)"/>
  <!-- memo up to read-memo -->
  <path class="flow" d="M1137,332 V210 H1136 V186" marker-end="url(#arrow)"/>
  <!-- review to read memo -->
  <path class="flow" d="M1062,158 H1088" marker-end="url(#arrow)"/>
  <!-- read memo to end -->
  <path class="flow" d="M1184,158 H1206" marker-end="url(#arrow)"/>

  <!-- feedback loop: review (up/down) -> evals -> calibrate score -->
  <path class="fb" d="M912,170 H700 H560 Q540,170 540,300 V598" marker-end="url(#arrowi)"/>
  <text x="556" y="250" class="s" fill="#4f46e5">labels (up / down)</text>
  <path class="fb" d="M588,624 H654 Q672,624 672,420 V390" marker-end="url(#arrowi)"/>
  <text x="678" y="470" class="s" fill="#4f46e5">calibrate</text>
  <!-- backtest validates pipeline -->
  <path class="fb" d="M760,598 V560 Q760,545 745,545 H300 Q286,545 286,420 V392" marker-end="url(#arrowi)"/>
  <text x="430" y="540" class="s" fill="#4f46e5">validates sourcing reliability</text>
</svg>
